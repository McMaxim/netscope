services:
  backend:
    build: ./backend
    restart: unless-stopped
    cap_add:
      - NET_RAW        # needed for ping / traceroute
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - internal

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
